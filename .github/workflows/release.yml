name: Build and Release Executables

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build Executable on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: windows-latest
            asset_name: test_course_reset-windows-amd64.exe
            build_cmd: uv run pyinstaller test_course_reset.spec --noconfirm
            output_binary: dist/test_course_reset.exe

          - os: macos-latest
            asset_name: test_course_reset-macos-universal
            build_cmd: uv run pyinstaller test_course_reset.spec --noconfirm
            output_binary: dist/test_course_reset

          - os: ubuntu-latest
            asset_name: test_course_reset-linux-x86_64
            build_cmd: uv run pyinstaller test_course_reset.spec --noconfirm
            output_binary: dist/test_course_reset

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: ".python-version"

      - name: Install Dependencies
        run: uv sync

      - name: Build Executable with PyInstaller
        run: ${{ matrix.build_cmd }}

      - name: Rename Output Binary for Upload
        shell: bash
        run: |
          mv ${{ matrix.output_binary }} ${{ matrix.asset_name }}

      - name: Upload Binary as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: ${{ matrix.asset_name }}

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            */test_course_reset-*
          draft: true # Allows you to review release notes before making it live
